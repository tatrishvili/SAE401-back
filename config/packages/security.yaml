# config/packages/security.yaml
security:
    # -------------------------
    # Password hashing
    # -------------------------
    password_hashers:
        App\Entity\User:
            algorithm: auto

    # -------------------------
    # User providers
    # -------------------------
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # -------------------------
    # Firewalls
    # -------------------------
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    # -------------------------
    # Access control
    # -------------------------
    access_control:
        # Public endpoints
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/categories, roles: PUBLIC_ACCESS }
        - { path: ^/api/transport, roles: PUBLIC_ACCESS }
        - { path: ^/api/food, roles: PUBLIC_ACCESS }
        - { path: ^/api/fruitsetlegumes, roles: PUBLIC_ACCESS }

        # Everything else under /api requires authentication
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

# -------------------------
# Test environment overrides
# -------------------------
when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4         # minimal cost for bcrypt (speed up tests)
                time_cost: 3    # minimal time for argon
                memory_cost: 10 # minimal memory for argon
